sources:
  # Original 5 sources — public, volunteer-maintained aggregators.
  - name: freefq
    url: https://raw.githubusercontent.com/freefq/free/master/v2
    format: base64
    enabled: true

  - name: pawdroid
    url: https://raw.githubusercontent.com/Pawdroid/Free-servers/main/sub
    format: base64
    enabled: true

  - name: vxiaov-clash
    url: https://raw.githubusercontent.com/vxiaov/free_proxies/main/clash/clash.provider.yaml
    format: clash
    enabled: true

  - name: mahdibland-aggregator
    url: https://raw.githubusercontent.com/mahdibland/V2RayAggregator/master/sub/sub_merge.txt
    format: uri-list
    enabled: true

  - name: mahdibland-shadowsocks
    url: https://raw.githubusercontent.com/mahdibland/ShadowsocksAggregator/master/sub/sub_merge.txt
    format: uri-list
    enabled: true

  # Added 2026-04-19: 7 additional sources verified alive + parser-compatible.
  # Expected ~1200 raw nodes total (500 cap per source), ~50% TCP-alive rate.
  - name: barry-far-v2ray
    url: https://raw.githubusercontent.com/barry-far/V2ray-Config/main/All_Configs_Sub.txt
    format: uri-list
    enabled: true

  - name: matin-v2ray
    url: https://raw.githubusercontent.com/MatinGhanbari/v2ray-configs/main/subscriptions/v2ray/super-sub.txt
    format: base64
    enabled: true

  - name: ebrasha-v2ray
    url: https://raw.githubusercontent.com/ebrasha/free-v2ray-public-list/main/all_extracted_configs.txt
    format: uri-list
    enabled: true

  - name: mfuu-clash
    url: https://raw.githubusercontent.com/mfuu/v2ray/master/clash.yaml
    format: clash
    enabled: true

  - name: ruking-clash
    url: https://raw.githubusercontent.com/Ruk1ng001/freeSub/main/clash.yaml
    format: clash
    enabled: true

  - name: lagzian-mix
    url: https://raw.githubusercontent.com/lagzian/SS-Collector/main/mix.txt
    format: uri-list
    enabled: true

  - name: lagzian-reality
    url: https://raw.githubusercontent.com/lagzian/SS-Collector/main/reality.txt
    format: uri-list
    enabled: true

probe:
  timeout_ms: 3000
  concurrency: 100
  max_nodes_per_source: 500
  tls_verify: true

aggregate:
  top_n: 150
  max_rtt_ms: 1500
  protocols: [vless, vmess, trojan, shadowsocks, hysteria2]

output:
  dir: output
  formats: [clash, singbox, v2ray-base64]
  pages:
    enabled: true
    dir: docs
    site_url: https://au1rxx.github.io/free-vpn-subscriptions

geoip:
  enabled: true
  db_url: https://github.com/P3TERX/GeoLite.mmdb/releases/latest/download/GeoLite2-Country.mmdb
  db_path: output/.cache/GeoLite2-Country.mmdb
  min_per_country: 3

readme:
  title: "Free VPN Subscriptions"
  repo_url: "https://github.com/Au1rxx/free-vpn-subscriptions"
