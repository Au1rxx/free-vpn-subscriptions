name: Aggregate & Publish

on:
  schedule:
    - cron: "0 * * * *" # every hour
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "cmd/**"
      - "internal/**"
      - "config.yaml"
      - ".github/workflows/aggregate.yml"

concurrency:
  group: aggregate
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  aggregate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build
        run: go build -o bin/fnctl ./cmd/fnctl

      - name: Aggregate
        run: ./bin/fnctl aggregate -c config.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/ docs/ README.md README_*.md
          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi
          git commit -m "chore: refresh aggregated subscriptions"
          git push origin main
